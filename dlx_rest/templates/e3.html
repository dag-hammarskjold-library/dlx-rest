{% extends 'base.html' %} {% block content %}
<div>
    <div id="editor" class="mx-2"></div>
</div>
<script type="module">
    import { createApp } from "{{url_for('static', filename='js/v3/vendor/vue.esm-browser.js')}}";
    import { AppStage } from "{{url_for('static', filename='js/v3/components/stage.mjs')}}";
    import { User } from "{{url_for('static', filename='js/v3/api/user.mjs')}}";

    // Initialize User object with current user data
    User.apiUrl = "{{ api_prefix }}";
    const currentUser = new User("{{ current_user.username }}");

    await currentUser.loadBasket();
    await currentUser.loadUserProfile();

    const e3 = createApp({
        props: {
            api_prefix: {
                type: String,
                required: true
            },
            records: {
                type: String,
                required: false
            },
            user: {
                type: Object,
                required: true
            }
        },
        components: { AppStage },
        template: `<app-stage :api_prefix="api_prefix" :records="records" :user="user" />`,
        setup() {
            return {}
        }
    }, {
        api_prefix: "{{ api_prefix }}",
        records: "{{ records }}",
        user: currentUser
    }).mount("#editor");
</script>
<style>
    /* main app */
    .clickable-text {
        color: blue;
    }

    .clickable-text:hover {
        text-decoration: underline;
        cursor: pointer;
    }

    div.app-container {
        display: inline-grid;
        grid-template-columns: 2;
        grid-template-rows: 2;
        position: block;
        width: 100%;
        height: 675px;
    }

    div.header-container {
        grid-row: 1;
        grid-column: 1 / 3;
        border: 1px solid black;
        padding: 3px;
        margin-bottom: 10px;
    }

    div.basket-container {
        grid-row: 2;
        grid-column: 1;
        margin-right: 10px;
        height: 650px;
    }

    /* search-or-recordstage */
    div.main-stage-container {
        grid-row: 2;
        grid-column: 2;
        position: block;
        width: 1100px;
        height: 675px;
        position: relative;
        z-index: 1;
    }

    div.app-search {
        border: 1px solid red;
        height: 100%;
    }

    div.app-search__hidden {
        display: none;
    }

    div.app-recordstage {
        height: 100%;
    }

    div.app-recordstage__hidden {
        display: none;
    }

    /* header */
    .header-logo>img {
        width: 50px;
    }

    /* basket */
    div.app-basket {
        padding: 3px;
        width: 200px
    }

    div.basket__hidden {
        display: none;
    }

    /* basket-record */
    div.basket-record {
        border: 1px dotted red
    }

    div.basket-record__selected {
        background-color: silver;
    }

    div.basket-record:hover {
        cursor: pointer;
        background-color: lightgray;
    }

    /* recordstage */
    div.recordstage-menu {
        display: flex;
        border: 1px solid black;
        padding: 3px;
    }

    div.recordstage-display {
        border: 1px solid green;
        overflow-y: auto;
        height: 100%;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 10px;
        position: relative;
        z-index: 1;
    }

    /* recordstage record */
    div.record-container {
        border: 1px solid blue;
        padding: 5px;
        flex: 1 1 calc(50% - 5px);
        min-width: 400px;
        max-height: 600px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        position: relative;
        z-index: 1;
    }

    div.record-container.record-container--focused {
        border: 2px solid #0d6efd;
        box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.18);
    }

    div.record-container:only-child {
        flex: 1 1 100%;
    }

    div.record-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        border-bottom: 1px solid #ccc;
        padding-bottom: 5px;
        flex-shrink: 0;
        position: sticky;
        top: 0;
        background: white;
        z-index: 500;
    }

    div.record-header-id {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: bold;
    }

    .record-focus-badge {
        background: #0d6efd;
        color: #fff;
        border-radius: 999px;
        padding: 1px 8px;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.01em;
    }

    .record-select-all {
        cursor: pointer;
        font-size: 1.1rem;
    }

    .record-select-all:hover {
        color: #0066cc;
    }

    div.record-controls {
        display: flex;
        gap: 5px;
    }

    .record-control-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        padding: 2px 5px;
        color: #333;
        transition: color 0.2s;
    }

    .record-control-btn:hover {
        color: #0066cc;
    }

    .record-control-btn.has-changes {
        color: #ff6b6b;
        font-weight: bold;
        animation: pulse 1s infinite;
    }

    .record-close-btn:hover {
        color: #cc0000;
    }

    @keyframes pulse {

        0%,
        100% {
            opacity: 1;
        }

        50% {
            opacity: 0.7;
        }
    }

    /* record field */
    /*
    div.record-field-container {
        border: 1px dotted black;
        padding: 3px;
        margin-bottom: 2px;
    }
    */
    div.record-field-container:hover {
        background-color: antiquewhite;
        position: relative;
    }

    div.record-field-container__invalid {
        border-left: 3px solid lightcoral;
        padding-left: 3px;
    }

    div.record-field-container__highlighted {
        border: 1px dotted red;
    }

    div.record-field-container__dropdown-open {
        position: relative;
        z-index: 1001;
    }

    div.record-field-wrapper {
        display: flex;
        align-items: center;
        /* gap: 3px; */
        flex-wrap: wrap;
    }

    div.record-field-header {
        display: flex;
        align-items: center;
        gap: 3px;
        order: 2;
    }

    .field-checkbox {
        cursor: pointer;
        order: 1;
    }

    div.record-field-tag {
        color: midnightblue;
        font-weight: bold;
        min-width: 30px;
    }

    .record-field-tag__invalid {
        background-color: lightcoral;
        color: black;
        border-radius: 2px;
        padding: 1px 3px;
    }

    div.record-field-indicators {
        display: flex;
        gap: 2px;
    }

    .field-menu-container {
        position: relative;
        order: 1;
    }

    .field-menu-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 2px 4px;
    }

    .field-menu-dropdown {
        position: absolute;
        background: #ffffff;
        border: 1px solid #ccc;
        border-radius: 4px;
        left: 0;
        top: 20px;
        z-index: 10000;
        min-width: 150px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        opacity: 1;
    }

    .menu-item {
        display: block;
        width: 100%;
        padding: 6px 10px;
        background: none;
        border: none;
        text-align: left;
        cursor: pointer;
        transition: background-color 0.2s;
        font-size: 0.9rem;
    }

    .menu-item:hover {
        background-color: #f0f0f0;
    }

    div.subfield-container {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        align-items: center;
        order: 3;
    }

    /* record subfield */
    div.subfield-row {
        display: inline-flex;
        align-items: center;
        gap: 1px;
        white-space: nowrap;
    }

    .subfield-code {
        color: salmon;
        font-weight: bold;
        font-size: 0.9rem;
    }

    span.subfield-value {
        padding: 1px 3px;
        border-radius: 2px;
        display: inline-block;
        font-size: 0.9rem;
    }

    .subfield-authority-controlled {
        color: blue;
        text-decoration: underline;
    }

    .subfield-value__changed {
        background-color: lightgoldenrodyellow;
    }

    .subfield-value__invalid {
        background-color: lightcoral;
    }

    .subfield-menu-container {
        position: relative;
        display: inline-flex;
    }

    .subfield-menu-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 1px 3px;
        font-size: 0.75rem;
        display: inline-block;
    }

    .subfield-menu-dropdown {
        position: absolute;
        background: #ffffff;
        border: 1px solid #ccc;
        border-radius: 4px;
        top: 20px;
        z-index: 10000;
        min-width: 150px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        opacity: 1;
    }

    .recordstage-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #999;
        font-size: 1.2rem;
    }

    .indicator-container {
        position: relative;
        display: inline-block;
        cursor: pointer;
    }

    .indicator {
        padding: 2px 4px;
        border-radius: 2px;
        transition: background-color 0.2s;
    }

    .indicator:hover {
        background-color: #e8e8e8;
    }

    .indicator-dropdown {
        position: absolute;
        background: #ffffff;
        border: 1px solid #ccc;
        border-radius: 4px;
        top: 20px;
        z-index: 10000;
        min-width: 80px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .indicator-option {
        display: block;
        width: 100%;
        padding: 6px 10px;
        background: none;
        border: none;
        text-align: center;
        cursor: pointer;
        transition: background-color 0.2s;
        font-size: 0.9rem;
    }

    .indicator-option:hover {
        background-color: #f0f0f0;
    }

    .indicator-option.active {
        background-color: #d0e8ff;
        font-weight: bold;
    }

    .code-menu-container {
        position: relative;
        display: inline-block;
    }

    .subfield-code {
        cursor: pointer;
        padding: 1px 2px;
        border-radius: 2px;
        transition: background-color 0.2s;
    }

    .subfield-code:hover {
        background-color: #ffe8e8;
    }

    .subfield-code__invalid {
        background-color: lightcoral;
        color: black;
    }

    .code-dropdown {
        position: absolute;
        background: #ffffff;
        border: 1px solid #ccc;
        border-radius: 4px;
        top: 18px;
        z-index: 99999;
        min-width: 80px;
        max-height: 300px;
        overflow-y: auto;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .value-menu-container {
        position: relative;
        display: inline-block;
    }

    .value-dropdown {
        position: absolute;
        background: #ffffff;
        border: 1px solid #ccc;
        border-radius: 4px;
        top: 18px;
        z-index: 99999;
        min-width: 140px;
        max-height: 300px;
        overflow-y: auto;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .value-option {
        display: block;
        width: 100%;
        padding: 6px 8px;
        background: none;
        border: none;
        text-align: left;
        cursor: pointer;
        transition: background-color 0.2s;
        font-size: 0.85rem;
        white-space: nowrap;
    }

    .value-option:hover {
        background-color: #f0f0f0;
    }

    .value-option.active {
        background-color: #d0e8ff;
        font-weight: bold;
    }

    .code-option {
        display: block;
        width: 100%;
        padding: 6px 8px;
        background: none;
        border: none;
        text-align: left;
        cursor: pointer;
        transition: background-color 0.2s;
        font-size: 0.85rem;
        font-family: monospace;
    }

    .code-option:hover {
        background-color: #f0f0f0;
    }

    .code-option.active {
        background-color: #ffe8d0;
        font-weight: bold;
    }

    .indicator-editable,
    .code-editable,
    .value-editable {
        cursor: pointer;
        padding: 2px 4px;
        border-radius: 2px;
        transition: background-color 0.2s;
    }

    .indicator-editable:hover,
    .code-editable:hover,
    .value-editable:hover {
        background-color: #e8f4ff;
    }

    .indicator-1-container,
    .indicator-2-container {
        position: relative;
        display: inline-block;
    }

    .record-field-selectable {
        border-radius: 0.375rem;
        transition: background-color 120ms ease-in-out;
    }

    .record-field-selectable.is-selected {
        background-color: var(--bs-primary-bg-subtle, #cfe2ff);
    }

    .record-field-selectable.is-changed {
        background-color: var(--bs-warning-bg-subtle, #fff3cd);
        border-left: 3px solid var(--bs-warning, #ffc107);
        padding-left: calc(0.75rem - 3px);
    }

    .record-field-selectable.is-selected.is-changed {
        background-color: var(--bs-warning, #ffc107);
    }

    .record-validation-summary {
        margin: 0 0 10px 0;
        padding: 8px 10px;
        border: 1px solid #f1aeb5;
        border-radius: 4px;
        background: #fff5f6;
        color: #842029;
        font-size: 0.85rem;
        line-height: 1.35;
    }

    .record-validation-summary-title {
        font-weight: 600;
        margin-bottom: 6px;
    }

    .record-validation-summary-list {
        margin: 0;
        padding-left: 18px;
        max-height: 140px;
        overflow-y: auto;
    }

    .record-validation-summary--disabled {
        border-color: #b6d4fe;
        background: #eff6ff;
        color: #084298;
    }
</style>
{% endblock %}
